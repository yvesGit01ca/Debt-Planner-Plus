kind = "web"
previewPath = "/"
title = "Bills Tracker"
version = "1.0.0"
id = "artifacts/bills-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20564

[services.development]
run = "pnpm --filter @workspace/bills-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bills-tracker", "run", "build" ]
publicDir = "artifacts/bills-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20564"
BASE_PATH = "/"
